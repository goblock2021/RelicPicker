name: Build EXE

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine build name suffix
        id: name
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${{ github.ref_name }}"           # e.g. v0.1.1
            echo "suffix=${VER}" >> $GITHUB_OUTPUT
          else
            SHA="${{ github.sha }}"                 # full commit hash
            echo "suffix=git-${SHA:0:7}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "RelicPicker-${{ steps.name.outputs.suffix }}" `
            --add-data "static;static" `
            --add-data "proto;proto" `
            --add-data "names.json;." `
            --hidden-import grpc `
            --hidden-import pywebview `
            --hidden-import internal_pb2 `
            --hidden-import internal_pb2_grpc `
            --hidden-import soapstone_pb2 `
            --hidden-import soapstone_pb2_grpc `
            --hidden-import common_pb2 `
            --hidden-import common_pb2_grpc `
            --collect-all grpc `
            --collect-all google `
            --collect-all pywebview `
            main.py

      - name: Upload artifact (daily)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: RelicPicker-${{ steps.name.outputs.suffix }}
          path: dist/RelicPicker-${{ steps.name.outputs.suffix }}.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RelicPicker-${{ steps.name.outputs.suffix }}.exe
